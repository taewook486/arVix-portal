# Deployment Pipeline for arVix-portal
# Vercel 배포를 위한 워크플로우

name: Deploy

# 트리거 조건: main 브랜치에 Push 시에만 배포
on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 배포 트리거

# 환경 변수 설정
env:
  NODE_VERSION: '20'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # 사전 배포 검증: CI 테스트 통과 확인
  pre-deploy-check:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: 배포 조건 확인
        id: check
        run: |
          echo "should-deploy=true" >> $GITHUB_OUTPUT

  # Vercel에 프리뷰 배포 (Pull Request)
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: github.event_name == 'pull_request'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: Vercel CLI 설치
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 프리뷰 배포
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: PR 코멘트 추가
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 프리뷰 배포가 완료되었습니다.\n\n배포 URL: ${{ steps.deploy.outputs.url }}'
            })

  # Vercel에 프로덕션 배포 (main 브랜치)
  production:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy-production.outputs.url }}

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: Node.js 캐싱 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 실행
        run: npm run build
        env:
          NODE_ENV: production

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 프로덕션 배포 (프리뷰)
        id: deploy-preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: 프로덕션으로 프로모션
        id: deploy-production
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: 배포 완료 알림
        run: |
          echo "🚀 프로덕션 배포가 완료되었습니다."
          echo "배포 URL: ${{ steps.deploy-production.outputs.url }}"

      - name: Slack 알림 (선택사항)
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚀 프로덕션 배포 완료: ${{ steps.deploy-production.outputs.url }}'
          webhook_url: ${{ vars.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}

  # 배포 후 헬스체크
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 배포된 URL 헬스체크
        run: |
          echo "배포된 애플리케이션 헬스체크를 시작합니다."
          # Vercel 프로덕션 URL로 헬스체크
          PRODUCTION_URL="https://arvix-portal.vercel.app"  # 실제 프로덕션 URL로 변경 필요

          for i in {1..5}; do
            echo "헬스체크 시도 $i/5..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $PRODUCTION_URL || echo "000")

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              echo "✅ 헬스체크 통과 (HTTP $STATUS)"
              exit 0
            fi

            echo "⏳ 대기 중... (HTTP $STATUS)"
            sleep 10
          done

          echo "❌ 헬스체크 실패 - 배포에 문제가 있을 수 있습니다."
          exit 1
